<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="l.png" type="image/png" />
    <title>J.B.A.I</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="toast-container"></div>
    <div class="sidebar-backdrop"></div>
    
    <button id="sidebar-toggle" data-tooltip="Toggle Sidebar" type="button" aria-label="Toggle sidebar" aria-expanded="false">
        <svg class="close-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="11 17 6 12 11 7"></polyline><polyline points="18 17 13 12 18 7"></polyline></svg>
        <svg class="open-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="13 17 18 12 13 7"></polyline><polyline points="6 17 11 12 6 7"></polyline></svg>
    </button>
    <nav class="sidebar" role="navigation" aria-label="Chat history">
        <div class="sidebar-header">
            <div class="sidebar-title-row">
                <h2>J.B.A.I</h2>
                <button id="new-chat-btn" type="button" aria-label="Start new chat" title="New Chat">New Chat</button>
            </div>
            <div class="sidebar-tabs">
                <button class="sidebar-tab active" id="tab-chats" type="button">Chats</button>
                <button class="sidebar-tab" id="tab-mystuff" type="button">My Stuff</button>
            </div>
        </div>

        <!-- Chat History List Tab Content -->
        <div class="sidebar-tab-content active" id="sidebar-chats-container">
            <div class="folders-header">
                <h3>Folders</h3>
                <button id="add-folder-btn" class="icon-btn" title="Create Folder" type="button">+</button>
            </div>
            <div id="folders-list" class="folders-list"></div>
            
            <div class="chats-header">
                <h3>Conversations</h3>
            </div>
            <div class="conversation-list" id="conversation-list" role="list" aria-label="Conversation history list"></div>
        </div>

        <!-- My Stuff Tab Content -->
        <div class="sidebar-tab-content" id="sidebar-mystuff-container" style="display: none;">
            <div class="mystuff-sidebar-list">
                <button class="mystuff-sidebar-item active" data-filter="all">📂 All Creations</button>
                <button class="mystuff-sidebar-item" data-filter="image">🖼️ Images</button>
                <button class="mystuff-sidebar-item" data-filter="html">💻 HTML Previews</button>
                <button class="mystuff-sidebar-item" data-filter="svg">📐 SVGs</button>
            </div>
        </div>

        <!-- Profile Footer Widget -->
        <div class="sidebar-footer">
            <div class="profile-widget" id="profile-widget">
                <div class="profile-avatar" id="profile-avatar">👤</div>
                <div class="profile-info">
                    <span class="profile-name" id="profile-display-name">Guest</span>
                </div>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <div class="chat-container" id="chat-container">
            <div id="message-area" class="message-area"></div>
            <div class="chat-input-container">
                <div id="file-previews-container"></div>
                <div id="active-skill-container" class="active-skill-container" style="display: none;">
                    <span class="active-skill-label">Active Skill:</span>
                    <span id="active-skill-name" class="active-skill-name"></span>
                    <button id="clear-skill-btn" class="clear-skill-btn" data-tooltip="Clear Active Skill" aria-label="Clear active skill">&times;</button>
                </div>
                <div class="chat-input-wrapper">
                    <button id="toggle-options-button" data-tooltip="Settings" type="button" aria-label="Open settings">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M2 14h4M10 8h4M18 16h4"/></svg>
                    </button>
                    <button id="prompt-launcher-button" data-tooltip="Starter Prompts" type="button" aria-label="Open starter prompts">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3l1.9 4.1L18 9l-4.1 1.9L12 15l-1.9-4.1L6 9l4.1-1.9L12 3z"></path><path d="M5 17l.95 2.05L8 20l-2.05.95L5 23l-.95-2.05L2 20l2.05-.95L5 17z"></path><path d="M19 14l.63 1.37L21 16l-1.37.63L19 18l-.63-1.37L17 16l1.37-.63L19 14z"></path></svg>
                    </button>
                    <button id="attach-file-button" data-tooltip="Attach Files" type="button" aria-label="Attach files">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                    </button>
                    <div id="chat-input-pill-container" class="chat-input-pill-container" style="display: none;"></div>
                    <textarea id="chat-input" placeholder="Type your message..." rows="1" aria-label="Message input" aria-describedby="chat-input-description"></textarea>
                    <span id="chat-input-description" class="sr-only">Type your message and press Enter to send, or Shift+Enter for a new line</span>
                    <button id="stop-button" data-tooltip="Stop Generating" type="button" style="display: none;" aria-label="Stop generating response">
                        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="6" y="6" width="12" height="12" rx="2" ry="2"/></svg>
                    </button>
                    <button id="send-button" data-tooltip="Send Message" type="button" disabled aria-label="Send message">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2,21L23,12L2,3V10L17,12L2,14V21Z"></path></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- My Stuff Creations Dashboard -->
        <div class="my-stuff-container" id="my-stuff-container" style="display: none;">
            <div class="my-stuff-header">
                <h2>My Creations</h2>
                <div class="my-stuff-controls">
                    <input type="text" id="my-stuff-search" placeholder="Search creations...">
                    <select id="my-stuff-filter">
                        <option value="all">All Types</option>
                        <option value="image">Images</option>
                        <option value="html">HTML Pages</option>
                        <option value="svg">SVGs</option>
                    </select>
                </div>
            </div>
            <div class="my-stuff-grid" id="my-stuff-grid"></div>
        </div>

        <!-- Canvas Split Panel -->
        <div id="split-canvas-container" class="split-canvas-container" style="display: none;">
            <div class="canvas-resize-handle" id="canvas-resize-handle"></div>
            <div class="canvas-header">
                <div class="canvas-tabs">
                    <button class="canvas-tab active" data-tab="preview">👁️ Live Preview</button>
                    <button class="canvas-tab" data-tab="editor">📝 Code Editor</button>
                    <button class="canvas-tab" data-tab="browser">🌐 Mini Browser</button>
                </div>
                <div class="canvas-actions">
                    <div class="responsive-controls" id="responsive-controls">
                        <button class="responsive-btn active" data-width="100%" title="Desktop">🖥️</button>
                        <button class="responsive-btn" data-width="768px" title="Tablet">📟</button>
                        <button class="responsive-btn" data-width="375px" title="Mobile">📱</button>
                    </div>
                    <button class="canvas-close-btn" id="canvas-close-btn" title="Close Panel">&times;</button>
                </div>
            </div>
            <div class="canvas-content">
                <!-- Live Preview Tab -->
                <div class="canvas-tab-content active" id="canvas-preview-tab">
                    <div class="iframe-wrapper">
                        <iframe id="canvas-preview-iframe" sandbox="allow-scripts allow-forms allow-modals allow-popups"></iframe>
                    </div>
                </div>
                <!-- Code Editor Tab -->
                <div class="canvas-tab-content" id="canvas-editor-tab" style="display: none;">
                    <div class="editor-container">
                        <textarea id="canvas-code-textarea" spellcheck="false"></textarea>
                        <div class="editor-buttons">
                            <button id="canvas-run-btn" class="primary-btn">▶ Run Code</button>
                            <button id="canvas-send-chat-btn" class="secondary-btn">💬 Send to Chat</button>
                        </div>
                    </div>
                </div>
                <!-- Mini Browser Tab -->
                <div class="canvas-tab-content" id="canvas-browser-tab" style="display: none;">
                    <div class="browser-navbar">
                        <button id="browser-back-btn" class="browser-nav-btn">◀</button>
                        <button id="browser-forward-btn" class="browser-nav-btn">▶</button>
                        <button id="browser-refresh-btn" class="browser-nav-btn">🔄</button>
                        <input type="text" id="browser-address-input" placeholder="Enter URL (e.g. https://wikipedia.org)...">
                        <button id="browser-scrape-btn" class="primary-btn">✂ Scrape Page</button>
                    </div>
                    <div class="iframe-wrapper">
                        <iframe id="canvas-browser-iframe" sandbox="allow-scripts allow-forms allow-same-origin allow-popups"></iframe>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="file-input" multiple hidden accept="image/*,video/*,audio/*,text/*,.js,.lua,.css,.html" aria-label="File input">

    <div id="fullscreen-preview-overlay" class="fullscreen-overlay">
        <button id="fullscreen-close-btn" class="fullscreen-close-btn" data-tooltip="Close (Esc)">&times;</button>
        <div id="fullscreen-content" class="fullscreen-content"></div>
    </div>
    
    <div id="custom-tooltip" class="custom-tooltip" role="tooltip"></div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script type="module" src="script.js" defer></script>
</body>
</html>
